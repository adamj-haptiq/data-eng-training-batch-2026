name: Dividend Analysis CI

on:
  push:
    branches: [main, master]
    paths:
      - "exercises_7th_day_project/**"
      - ".github/workflows/dividend-analysis.yml"
  pull_request:
    paths:
      - "exercises_7th_day_project/**"
      - ".github/workflows/dividend-analysis.yml"

defaults:
  run:
    working-directory: exercises_7th_day_project

jobs:
  test:
    name: Unit tests & coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: exercises_7th_day_project/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run pytest with coverage
        run: python -m pytest --cov=etl --cov-report=term-missing --cov-report=xml

      - name: Coverage summary
        run: python -m coverage report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: exercises_7th_day_project/coverage.xml

  pipeline:
    name: Full pipeline (ETL → GX → dbt)
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: exercises_7th_day_project/requirements.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Prefect flow
        env:
          PREFECT_LOGGING_LEVEL: WARNING
        run: python flow.py
